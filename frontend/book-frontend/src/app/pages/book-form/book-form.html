<h2>{{ isEditMode ? 'Edit Book' : 'Add New Book' }}</h2>

<form (ngSubmit)="onSubmit()" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input type="text" class="form-control" [(ngModel)]="book.title" name="title" required />
  </div>
  <div class="mb-3">
    <label class="form-label">Author</label>
    <input type="text" class="form-control" [(ngModel)]="book.author" name="author" required />
  </div>
  <div class="mb-3">
    <label class="form-label">Publication Date</label>
    <input type="date" class="form-control" [(ngModel)]="book.publicationDate" name="publicationDate" required />
  </div>
  <button type="submit" class="btn btn-primary">
    <i class="fa-solid fa-check"></i> Save
  </button>
</form>
