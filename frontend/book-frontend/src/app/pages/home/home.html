<div
  class="toast align-items-center text-bg-success border-0 position-fixed bottom-0 end-0 m-4"
  [class.show]="showToast"
  [class.d-none]="!showToast"
  style="z-index: 1055;"
>
  <div class="d-flex">
    <div class="toast-body"><i class="fa-solid fa-circle-check"></i> {{ toastMessage }}</div>
  </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><i class="fa-solid fa-book-open"></i> Books</h2>
  <a routerLink="/books/add" class="btn btn-primary">
    <i class="fa-solid fa-plus"></i> Add New Book
  </a>
</div>

<div class="mb-3">
  <input
    type="text"
    class="form-control"
    placeholder="Search by title or author..."
    [(ngModel)]="searchTerm"
  />
</div>

<div *ngIf="loading" class="text-center my-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div *ngIf="!loading">
  <div class="row g-3" *ngIf="filteredBooks.length > 0; else noBooks">
    <div class="col-md-4" *ngFor="let book of filteredBooks">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">{{ book.title }}</h5>
          <p class="card-text text-muted">{{ book.author }}</p>
          <p class="card-text"><small>Published: {{ book.publicationDate | date }}</small></p>
          <div class="d-flex gap-2">
            <a [routerLink]="['/books/edit', book.id]" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-pen"></i> Edit
            </a>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteBook(book.id)">
              <i class="fa-solid fa-trash"></i> Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noBooks>
    <p class="text-muted">No books yet. Add your first one!</p>
  </ng-template>
</div>
