<div class="col-md-5 mx-auto mt-5">
  <h2><i class="fa-solid fa-user-plus"></i> Register</h2>
  <form (ngSubmit)="onSubmit()" class="mt-3">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" [(ngModel)]="username" name="username" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" [(ngModel)]="password" name="password" required />
    </div>
    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
    <button type="submit" class="btn btn-primary">Register</button>
    <p class="mt-3">Already have an account? <a routerLink="/login">Login here</a></p>
  </form>
</div>
